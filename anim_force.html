    <text

       x="100.18491"

    <path

    <path

  </main>

  <script>
    const svgRoot = document.querySelector('svg');
    const layer = svgRoot.querySelector('#layer1') || svgRoot;
    const NS = 'http://www.w3.org/2000/svg';

    function clamp(x, a = 0, b = 1) {
      return Math.max(a, Math.min(b, x));
    }

    function smoothstep(x) {
      x = clamp(x);
      return x * x * (3 - 2 * x);
    }

    function trianglePulse(x) {
      // Forward-only pulse: appears, flashes briefly, disappears.
      x = x - Math.floor(x);
      return smoothstep((x - 0.08) / 0.18) * (1 - smoothstep((x - 0.47) / 0.28));
    }

    function ensureDefs() {
      let defs = svgRoot.querySelector('defs');
      if (!defs) {
        defs = document.createElementNS(NS, 'defs');
        svgRoot.insertBefore(defs, svgRoot.firstChild);
      }
      return defs;
    }

    function makeBlobFilter(id, seed) {
      const defs = ensureDefs();
      if (svgRoot.querySelector('#' + id)) return;

      const filter = document.createElementNS(NS, 'filter');
      filter.setAttribute('id', id);
      filter.setAttribute('x', '-85%');
      filter.setAttribute('y', '-85%');
      filter.setAttribute('width', '270%');
      filter.setAttribute('height', '270%');

      const turbulence = document.createElementNS(NS, 'feTurbulence');
      turbulence.setAttribute('id', id + '-turbulence');
      turbulence.setAttribute('type', 'fractalNoise');
      turbulence.setAttribute('baseFrequency', '0.035');
      turbulence.setAttribute('numOctaves', '2');
      turbulence.setAttribute('seed', String(seed));
      turbulence.setAttribute('result', 'noise');

      const displacement = document.createElementNS(NS, 'feDisplacementMap');
      displacement.setAttribute('id', id + '-displacement');
      displacement.setAttribute('in', 'SourceGraphic');
      displacement.setAttribute('in2', 'noise');
      displacement.setAttribute('scale', '2.0');
      displacement.setAttribute('xChannelSelector', 'R');
      displacement.setAttribute('yChannelSelector', 'G');

      filter.appendChild(turbulence);
      filter.appendChild(displacement);
      defs.appendChild(filter);
    }

    makeBlobFilter('blob-entropic-shape-change', 11);
    makeBlobFilter('blob-active-shape-change', 17);
    makeBlobFilter('blob-friction-shape-change', 23);

    function byId(id) { return svgRoot.querySelector('#' + CSS.escape(id)); }

    function wrapElements(ids, wrapperId) {
      const elements = ids.map(byId).filter(Boolean);
      if (!elements.length) return null;
      let wrapper = byId(wrapperId);
      if (wrapper) return wrapper;

      wrapper = document.createElementNS(NS, 'g');
      wrapper.setAttribute('id', wrapperId);
      elements[0].parentNode.insertBefore(wrapper, elements[0]);
      for (const el of elements) wrapper.appendChild(el);
      return wrapper;
    }

    function wrapOne(id, wrapperId) { return wrapElements([id], wrapperId); }

    function setTranslate(el, dx, dy) {
      if (!el) return;
      el.setAttribute('transform', `translate(${dx.toFixed(3)} ${dy.toFixed(3)})`);
    }

    function setOpacity(el, value) {
      if (!el) return;
      el.setAttribute('opacity', String(clamp(value).toFixed(3)));
    }

    function addSparkCluster(id, cx, cy, rot = 0) {
      const g = document.createElementNS(NS, 'g');
      g.setAttribute('id', id);
      g.setAttribute('class', 'spark-extra');
      g.setAttribute('transform', `rotate(${rot} ${cx} ${cy})`);

      const paths = [
        `M ${cx - 1.45} ${cy - 0.25} l -1.15 -0.78`,
        `M ${cx - 0.25} ${cy - 1.05} l -0.15 -1.35`,
        `M ${cx + 0.95} ${cy - 0.30} l 0.95 -1.00`,
      ];

      for (const d of paths) {
        const p = document.createElementNS(NS, 'path');
        p.setAttribute('d', d);
        g.appendChild(p);
      }

      layer.appendChild(g);
      return g;
    }

    // Main filament groups. Only the filament strokes are translated; arrows stay fixed.
    const entropicTop = wrapElements([
      'path1'
    ], 'anim-entropic-top-filament');

    const entropicBottom = wrapElements([
      'path1-4'
    ], 'anim-entropic-bottom-filament');

    const activeTop = wrapElements([
      'path1-6'
    ], 'anim-active-top-filament');

    const activeBottom = wrapElements([
      'path1-4-2'
    ], 'anim-active-bottom-filament');

    const frictionTop = wrapElements([
      'path1-6-0'
    ], 'anim-friction-top-filament');

    const frictionBottom = wrapElements([
      'path1-4-2-4'
    ], 'anim-friction-bottom-filament');

    const entropicDumbbells = [
      wrapOne('g5-5', 'anim-entropic-dumbbell-1'),
      wrapOne('g5-5-4', 'anim-entropic-dumbbell-2'),
      wrapOne('g5-5-4-8', 'anim-entropic-dumbbell-3'),
    ].filter(Boolean);

    const activeDumbbells = [wrapOne('g5-5-4-85', 'anim-active-dumbbell')].filter(Boolean);
    const frictionDumbbells = [wrapOne('g5-5-4-85-6', 'anim-friction-dumbbell')].filter(Boolean);

    const entropicBlob = wrapOne('path4', 'anim-entropic-blob');
    const activeBlob = wrapOne('path4-1', 'anim-active-blob');
    const frictionBlob = wrapOne('path4-1-8', 'anim-friction-blob');

    const entropicBlobPath = byId('path4');
    const activeBlobPath = byId('path4-1');
    const frictionBlobPath = byId('path4-1-8');
    if (entropicBlobPath) entropicBlobPath.setAttribute('filter', 'url(#blob-entropic-shape-change)');
    if (activeBlobPath) activeBlobPath.setAttribute('filter', 'url(#blob-active-shape-change)');
    if (frictionBlobPath) frictionBlobPath.setAttribute('filter', 'url(#blob-friction-shape-change)');

    const atp = wrapOne('text7', 'anim-atp-word');
    const adp = wrapOne('text7-3', 'anim-adp-word');
    if (adp) adp.setAttribute('opacity', '0');

    const spark1 = wrapOne('g5-4', 'anim-spark-existing-1');
    const spark2 = wrapOne('g5-4-8-0', 'anim-spark-existing-2');
    const spark3 = addSparkCluster('anim-spark-blob-1', 177.8, 24.7, 18);
    const spark4 = addSparkCluster('anim-spark-blob-2', 181.0, 29.1, 196);
    const sparks = [spark1, spark2, spark3, spark4].filter(Boolean);

    const allJitterObjects = [
      ...entropicDumbbells,
      ...activeDumbbells,
      ...frictionDumbbells,
      entropicBlob,
      activeBlob,
      frictionBlob,
    ].filter(Boolean).map((el, i) => {
      return {
        el,
        ax: 0.18 + 0.16 * ((i * 37) % 11) / 10,
        ay: 0.13 + 0.13 * ((i * 53) % 13) / 12,
        p1: i * 1.733 + 0.4,
        p2: i * 2.219 + 1.1,
        w1: 0.55 + 0.07 * (i % 5),
        w2: 0.41 + 0.06 * ((i + 2) % 6),
      };
    });

    function jitterFor(obj, t) {
      return {
        x: obj.ax * Math.sin(2.0 * t * obj.w1 + obj.p1) + 0.055 * Math.sin(4.1 * t + obj.p2),
        y: obj.ay * Math.cos(1.9 * t * obj.w2 + obj.p2) + 0.050 * Math.cos(3.3 * t + obj.p1),
      };
    }

    function setBlobFilter(id, freq, scale) {
      const turbulence = byId(id + '-turbulence');
      const displacement = byId(id + '-displacement');
      if (turbulence) turbulence.setAttribute('baseFrequency', freq.toFixed(4));
      if (displacement) displacement.setAttribute('scale', scale.toFixed(3));
    }

    // Entropic dumbbells spread out but remain on the left side of the black divider.
    // Index order is right / middle / left in the entropic panel.
    const entropicSpread = [
      { dx: 0.35, dy: 0.10 },
      { dx: -1.85, dy: -0.28 },
      { dx: -5.15, dy: 0.18 },
    ];
    const entropicDumbbellMaxDx = [0.58, 3.10, 8.40];

    function animate(timeMs) {
      const duration = 6600;
      const t = timeMs / 1000;
      const p = (timeMs % duration) / duration;

      const move = smoothstep((p - 0.08) / 0.68);
      const fadeIn = smoothstep(p / 0.065);
      const fadeOut = 1 - smoothstep((p - 0.86) / 0.12);
      const globalOpacity = fadeIn * fadeOut;
      layer.setAttribute('opacity', globalOpacity.toFixed(3));
      // path1-6-0 (the top filament in the rightmost sketch) is outside #layer1 in the
      // original Inkscape SVG, so fade its animation wrapper explicitly as well.
      setOpacity(frictionTop, globalOpacity);

      // Entropic panel: filaments move inward, crosslinkers spread within the left-side overlap,
      // and blob density decreases as its width increases.
      const entropicInward = 5.8 * move;
      setTranslate(entropicTop, entropicInward, 0);
      setTranslate(entropicBottom, -entropicInward, 0);

      entropicDumbbells.forEach((el, i) => {
        const obj = allJitterObjects.find(o => o.el === el);
        const j = obj ? jitterFor(obj, t) : { x: 0, y: 0 };
        const spread = entropicSpread[i] || { dx: 0, dy: 0 };
        const maxDx = entropicDumbbellMaxDx[i] ?? 0.58;
        const dx = clamp(spread.dx * move + j.x, -12.0, maxDx);
        const dy = spread.dy * move + j.y;
        setTranslate(el, dx, dy);
      });

      const ebObj = allJitterObjects.find(o => o.el === entropicBlob);
      const ej = ebObj ? jitterFor(ebObj, t) : { x: 0, y: 0 };
      if (entropicBlob) {
        // Keep the entropic blob inside the widening overlap.  Instead of a large
        // one-sided stretch, start it slightly compact and let it broaden around
        // the overlap center.  The final scale is deliberately bounded so the
        // contour does not protrude beyond the two inward-moving filaments.
        const anchorX = 31.48;
        const anchorY = 27.2;
        const sx = 0.84 + 0.36 * move;
        const sy = 1.02 - 0.08 * move;
        const boundedJx = clamp(ej.x, -0.10, 0.10);
        const boundedJy = clamp(ej.y, -0.08, 0.08);
        entropicBlob.setAttribute(
          'transform',
          `translate(${boundedJx.toFixed(3)} ${boundedJy.toFixed(3)}) translate(${anchorX} ${anchorY}) scale(${sx.toFixed(3)} ${sy.toFixed(3)}) translate(${-anchorX} ${-anchorY})`
        );
        setOpacity(entropicBlob, 1.0 - 0.52 * move);
      }
      setBlobFilter(
        'blob-entropic-shape-change',
        0.032,
        1.85
      );

      // Active panel: outward filament sliding, idle crosslinker/blob fluctuations,
      // and ATP conversion into ADP.
      const outward = 6.2 * move;
      setTranslate(activeTop, -outward, 0);
      setTranslate(activeBottom, outward, 0);

      activeDumbbells.forEach((el) => {
        const obj = allJitterObjects.find(o => o.el === el);
        const j = obj ? jitterFor(obj, t) : { x: 0, y: 0 };
        setTranslate(el, j.x, j.y);
      });
      const abObj = allJitterObjects.find(o => o.el === activeBlob);
      const aj = abObj ? jitterFor(abObj, t) : { x: 0, y: 0 };
      setTranslate(activeBlob, aj.x, aj.y);
      setBlobFilter(
        'blob-active-shape-change',
        0.032 + 0.004 * Math.sin(t * 1.4 + 2.0),
        1.7 + 1.25 * (0.5 + 0.5 * Math.sin(t * 1.6 + 0.9))
      );

      const chem = smoothstep((p - 0.12) / 0.55);
      if (atp) {
        atp.setAttribute('transform', `translate(${(16.65 * chem).toFixed(3)} ${(17.70 * chem).toFixed(3)})`);
        setOpacity(atp, 1 - chem);
      }
      if (adp) {
        setOpacity(adp, chem);
      }

      // Friction panel: outward sliding and flashing sparks around dumbbell/blob.
      setTranslate(frictionTop, -outward, 0);
      setTranslate(frictionBottom, outward, 0);

      frictionDumbbells.forEach((el) => {
        const obj = allJitterObjects.find(o => o.el === el);
        const j = obj ? jitterFor(obj, t) : { x: 0, y: 0 };
        setTranslate(el, j.x, j.y);
      });
      const fbObj = allJitterObjects.find(o => o.el === frictionBlob);
      const fj = fbObj ? jitterFor(fbObj, t) : { x: 0, y: 0 };
      setTranslate(frictionBlob, fj.x, fj.y);
      setBlobFilter(
        'blob-friction-shape-change',
        0.031 + 0.004 * Math.sin(t * 1.3 + 3.7),
        1.6 + 1.15 * (0.5 + 0.5 * Math.sin(t * 1.7 + 2.3))
      );

      sparks.forEach((s, i) => {
        const flicker = trianglePulse(p * 6.0 + i * 0.23) * (0.65 + 0.35 * Math.sin(t * 7.0 + i));
        setOpacity(s, 0.15 + 0.85 * clamp(flicker));
        if (s.id.startsWith('anim-spark-blob')) {
          const shakeX = 0.10 * Math.sin(t * 12.0 + i);
          const shakeY = 0.10 * Math.cos(t * 11.0 + i * 0.8);
          s.setAttribute('transform', `${s.getAttribute('data-base-transform') || s.getAttribute('transform') || ''} translate(${shakeX.toFixed(3)} ${shakeY.toFixed(3)})`);
        }
      });

      requestAnimationFrame(animate);
    }

    // Store the base transform for the two added spark clusters before animation starts.
    for (const s of sparks) {
      if (s && s.id && s.id.startsWith('anim-spark-blob')) {
        s.setAttribute('data-base-transform', s.getAttribute('transform') || '');
      }
    }

    if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      requestAnimationFrame(animate);
    } else {
      layer.setAttribute('opacity', '1');
      setOpacity(frictionTop, 1);
    }
  </script>
